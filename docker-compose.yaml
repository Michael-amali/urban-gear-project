version: '3.8'

services:

  postgres-warehouse:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${WAREHOUSE_DB}
      POSTGRES_USER: ${WAREHOUSE_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pg_warehouse:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_USER} -d ${WAREHOUSE_DB}"]
      interval: 5s
      retries: 5


  postgres-airflow:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${AIRFLOW_DB}
      POSTGRES_USER: ${AIRFLOW_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD}
    volumes:
      - pg_airflow:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_USER}"]
      interval: 5s
      retries: 5


  airflow-init:
    build: .
    image: urbangear-airflow:latest
    depends_on:
      postgres-airflow:
        condition: service_healthy

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

    volumes:
      - ./dags:/opt/airflow/dags
      - ./etl:/opt/airflow/etl
      - ./config:/opt/airflow/config
      - ./data:/opt/airflow/data
      - ./dbt:/opt/airflow/dbt
      - ./plugins:/opt/airflow/plugins

    entrypoint: /bin/bash

    command: >
      -c "
      airflow db init &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME}
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname Admin
      --lastname User
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL}
      "


  airflow-webserver:
    build: .
    image: urbangear-airflow:latest

    depends_on:
      postgres-airflow:
        condition: service_healthy
      postgres-warehouse:
        condition: service_healthy

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB}

      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

      ENV: local

      POSTGRES_HOST: postgres-warehouse
      POSTGRES_USER: ${WAREHOUSE_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD}
      POSTGRES_DB: ${WAREHOUSE_DB}

    volumes:
      - ./dags:/opt/airflow/dags
      - ./etl:/opt/airflow/etl
      - ./config:/opt/airflow/config
      - ./data:/opt/airflow/data
      - ./dbt:/opt/airflow/dbt
      - ./plugins:/opt/airflow/plugins

    ports:
      - "8080:8080"

    command: airflow webserver

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s


  airflow-scheduler:
    build: .
    image: urbangear-airflow:latest

    depends_on:
      airflow-webserver:
        condition: service_started

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB}

      ENV: local

      POSTGRES_HOST: postgres-warehouse
      POSTGRES_USER: ${WAREHOUSE_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD}
      POSTGRES_DB: ${WAREHOUSE_DB}

    volumes:
      - ./dags:/opt/airflow/dags
      - ./etl:/opt/airflow/etl
      - ./config:/opt/airflow/config
      - ./data:/opt/airflow/data
      - ./dbt:/opt/airflow/dbt
      - ./plugins:/opt/airflow/plugins

    command: airflow scheduler


volumes:
  pg_warehouse:
  pg_airflow: